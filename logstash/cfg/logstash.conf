input{
    jdbc{
        jdbc_driver_library => "/usr/share/logstash/postgresql-42.7.0.jar"
        jdbc_driver_class => "org.postgresql.Driver"
        jdbc_connection_string => "${DATASOURCE_URL}"
        jdbc_user => "${DATABASE_USERNAME}"
        jdbc_password => "${DATABASE_PASSWORD}"
        jdbc_paging_enabled => true
        use_column_value => true
        tracking_column => "modification_time"
        tracking_column_type => "timestamp"
        schedule => "*/15 * * * * *"
        statement => "SELECT * FROM writings.book WHERE modification_time > :sql_last_value
        AND modification_time < CURRENT_TIMESTAMP ORDER BY modification_time ASC"
    }
}

filter{
    mutate{
            copy => {"id" => "[@metadata][_id]"}
            remove_field => ["@version","@timestamp"]
    }
}

output{
    elasticsearch {
        index => "book_sync_idx"
        document_id => "%{[@metadata][_id]}"
        hosts=> "${ELASTIC_HOSTS}"
        user=> "${ELASTIC_USER}"
        password=> "${ELASTIC_PASSWORD}"
        cacert=> "certs/ca/ca.crt"
    }
}