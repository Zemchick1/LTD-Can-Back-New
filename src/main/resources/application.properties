spring.datasource.url=jdbc:postgresql://localhost:55433/book_service
#TODO put sensitive data into env
spring.datasource.username=${db_username}
spring.datasource.password=${db_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.format_sql=true
secret_key_jwt=${secret_key_jwt}
cookie_lifetime=2592000000
jwt_token_lifetime=3600000
forgot_password_token_lifetime=3600000
resilience4j.ratelimiter.instances.refresh_token_rate_limiter.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.refresh_token_rate_limiter.limitForPeriod=1
resilience4j.ratelimiter.instances.refresh_token_rate_limiter.timeoutDuration=1s