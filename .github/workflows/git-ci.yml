name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Set up JDK 17
          uses: actions/setup-java@v2
          with:
            java-version: 17
            distribution: 'adopt'

        - name: Build
          run: ./gradlew --build-cache bootJar

        - name: Archive build
          uses: actions/upload-artifact@v2
          with:
            name: Build Artifact
            path: ./build/libs/*.jar
            expire_in: 1 week

  test:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Set up JDK 17
          uses: actions/setup-java@v2
          with:
            java-version: 17
            distribution: 'adopt'
            
        - name: Run tests
          run: ./gradlew check

  docker:
     needs: build
     runs-on: ubuntu-latest

     steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
          clean: false

      - name: Download artifact
        uses: actions/download-artifact@v2
        with:
          name: Build Artifact
          path: ./build/libs/*.jar

      - name: Build Docker image
        run: docker build -f Dockerfile --build-arg JAR_FILE=./build/libs/*.jar -t ${{secrets.DOCKER_REPOSITORY}}:backend .

      - name: login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: push Docker image to registry
        run: docker push ${{secrets.DOCKER_REPOSITORY}}:backend

      - name: Build Docker compose
        run: docker-compose -f compose.yaml build
          
